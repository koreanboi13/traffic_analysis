services:
  teststand-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teststand
      POSTGRES_USER: teststand
      POSTGRES_PASSWORD: teststand
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teststand"]
      interval: 2s
      retries: 10

  teststand-app:
    build: ./teststand
    depends_on:
      teststand-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://teststand:teststand@teststand-db:5432/teststand?sslmode=disable
      PORT: "8888"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 2s
      retries: 10

  waf:
    build: ./waf
    ports:
      - "8081:8080"
    depends_on:
      teststand-app:
        condition: service_started
      clickhouse:
        condition: service_healthy
    environment:
      WAF_CONFIG_PATH: /app/config.yaml
